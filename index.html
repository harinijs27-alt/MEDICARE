<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediCare AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="top">
    <h1>💊 MediCare AI</h1>
    <p>Smart Medicine Reminder System</p>
  </div>

  <div class="card">

    <label id="medicineLabel">Medicine Name</label>
    <input type="text" id="medicine">

    <label id="timeLabel">Reminder Time</label>
    <input type="time" id="time">

    <label id="languageLabel">Select Language</label>
    <select id="language" onchange="changeLanguage()">
      <option value="en">English</option>
      <option value="ta">Tamil</option>
      <option value="hi">Hindi</option>
      <option value="te">Telugu</option>
    </select>

    <label id="caregiverLabel">Caregiver Number</label>
    <input type="tel" id="caregiver">

    <button id="setBtn" onclick="setReminder()">Set Reminder</button>
    <button id="takenBtn" onclick="markTaken()">Mark as Taken</button>

    <button onclick="callCaregiver()">Call Caregiver</button>
    <button onclick="callAmbulance()">Ambulance</button>

  </div>

  <h3 id="status">Status: Not Set</h3>
  <div>⏰ <span id="clock"></span></div>

  <ul id="logList"></ul>

</div>

<audio id="alarm"
src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-tone-996.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
