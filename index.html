<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medication Reminder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>💊 Medication Reminder</h1>

    <label>Medicine Name</label>
    <input type="text" id="medicine">

    <label>Reminder Time</label>
    <input type="time" id="time">

    <label>Caregiver Number</label>
    <input type="text" id="caregiver">

    <label>Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="ta">Tamil</option>
      <option value="hi">Hindi</option>
      <option value="te">Telugu</option>
    </select>

    <button onclick="setReminder()">Set Reminder</button>
    <button onclick="markTaken()">Mark as Taken</button>
    <button onclick="callCaregiver()">Call Caregiver</button>
    <button onclick="callAmbulance()">Ambulance</button>

    <h3 id="status">Status: Not set</h3>

    <h4>⏰ Clock: <span id="clock"></span></h4>

    <ul id="logList"></ul>

  </div>

  <script src="script.js"></script>

</body>
</html>
